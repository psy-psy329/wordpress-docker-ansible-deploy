---
- name: 部署 WordPress 博客环境
  hosts: all
  become: yes
  vars:
    docker_compose_version: "2.24.0"
    compose_project_dir: "/opt/myblog"

  tasks:
    - name: 安装依赖包
      yum:
        name:
          - yum-utils
          - device-mapper-persistent-data
          - lvm2
        state: present

    - name: 添加 Docker 官方仓库
      get_url:
        url: https://download.docker.com/linux/centos/docker-ce.repo
        dest: /etc/yum.repos.d/docker-ce.repo

    - name: 安装 Docker 和 Docker Compose 插件
      yum:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    - name: 创建 Docker 配置目录
      file:
        path: /etc/docker
        state: directory

    - name: 配置镜像加速器
      copy:
        content: |
          {
            "registry-mirrors": [
              "https://docker.xuanyuan.me",
              "https://docker.1ms.run",
              "https://docker.m.daocloud.io"
            ]
          }
        dest: /etc/docker/daemon.json
      notify: restart docker

    - name: 启动 Docker 并设为开机自启
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: 创建项目目录
      file:
        path: "{{ compose_project_dir }}"
        state: directory

    - name: 上传 docker-compose.yml
      copy:
        src: docker-compose.yml
        dest: "{{ compose_project_dir }}/docker-compose.yml"
        mode: '0644'

    - name: 启动 WordPress 服务
      docker_compose:
        project_src: "{{ compose_project_dir }}"
        state: present
        restarted: yes

  handlers:
    - name: restart docker
      systemd:
        name: docker
        state: restarted
        daemon_reload: yes